<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
  <title>Login Page</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" th:href="@{/}">Home</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
</nav>

<div class="container">
  <div id="loginbox" style="margin-top: 50px;" class="col-md-3 col-md-offset-2 col-sm-6 col-sm-offset-2">
    <div class="card border-info">
      <div class="card-header bg-info">
        Sign In
      </div>

      <div class="card-body">
        <div class="card-text">

          <!-- Login Form -->
          <form action="#" th:action="@{/authenticateTheUser}" method="POST" class="form-horizontal">

            <!-- Place for messages: error, alert etc ... -->
            <div class="form-group">
              <div class="col-xs-15">
                <div>
                  <!-- Check for login error -->

                  <div th:if="${param.error}">
                    <div class="alert alert-danger col-xs-offset-1 col-xs-10">
                      Invalid username and password.
                    </div>
                  </div>
<!--                  Check if user created account-->
                  <div th:if="${accountCreated}">
                    <div class="alert alert-success">
                      Your account has been successfully created. You can now log in.
                    </div>
                  </div>
                  <!--Check for logout-->
                  <div th:if="${param.logout}">

                    <div class="alert alert-success col-xs-offset-1 col-xs-10">
                      You have been logged out.
                    </div>

                  </div>
                </div>
              </div>
            </div>


            <div style="margin-bottom: 25px;" class="input-group">
              <input type="text" name="username" placeholder="username" class="form-control" />
            </div>


            <div style="margin-bottom: 25px;" class="input-group">
              <input type="password" name="password" placeholder="password" class="form-control" />
            </div>

            <!-- Login/Submit Button -->
            <div style="margin-top: 10px;" class="form-group">
              <div class="col-sm-6 controls">
                <button type="submit" class="btn btn-success">Login</button>
              </div>
            </div>

          </form>
          <div>
            Don't have an account? <a th:href="@{/signup}">Sign up</a> now!
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
